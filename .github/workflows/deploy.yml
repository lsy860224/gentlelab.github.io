name: Build (deployment moved to lsy860224.github.io repo)

# 2026-04-28 — 이 repo는 더 이상 자체 GitHub Pages를 서빙하지 않음.
# canonical은 https://lsy860224.github.io/ (lsy860224/lsy860224.github.io repo).
# 이 워크플로우는 빌드만 검증하여 main 브랜치 정합성 보장.
#
# 자동 cross-repo 배포 셋업 (TODO):
# 1) Personal Access Token (repo write) 발급
# 2) 이 repo의 Settings → Secrets → DEPLOY_TOKEN 등록
# 3) 아래 deploy job uncomment + git push 단계 추가
# 4) lsy860224/lsy860224.github.io repo의 main을 dist로 덮어쓰기

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (verify integrity only)
        run: npm run build

